name: tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install compatibility-test dependencies
        if: matrix.python-version == '3.10'
        run: python -m pip install -e ".[test]" -c requirements-compatibility.txt
      - name: Install pinned Python 3.12 test dependencies
        if: matrix.python-version == '3.12.13'
        run: python -m pip install -e ".[test]" -c requirements-release.txt
      - name: Run tests
        run: python -m pytest
      - name: Verify repository data release
        run: python scripts/verify_repository_data.py
      - name: Verify 4-ATP blank audit
        run: python scripts/verify_4atp_blank_audit.py
      - name: Verify human-data lineage mapping
        run: python scripts/report_human_data_lineage.py --check
      - name: Verify proof-of-concept mapping
        run: python scripts/proof_of_concept_mapping.py --check
      - name: Verify calibration-curve computational lineage
        run: python scripts/audit_calibration_curve.py --check

  release-reproducibility:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12.10"
          cache: pip
      - name: Install canonical release dependencies
        run: python -m pip install -e ".[test]" -c requirements-release.txt
      - name: Verify locked confirmed-blank 4-ATP reanalysis
        run: python scripts/reprocess_4atp_750_5_5_h.py --check
      - name: Verify medium-power historical computational replay
        run: python scripts/replay_4atp_750_5_5_m.py --cross-environment-check
      - name: Verify calibration-curve computational lineage
        run: python scripts/audit_calibration_curve.py --check
